<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="A compass rose — choosing a practitioner is a wayfinding act">
  <defs>
    <linearGradient id="bgD" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#101522"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="oklch(0.62 0.16 22)" stop-opacity="0.55"/>
      <stop offset="80%" stop-color="#0a0e1a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bgD)"/>
  <rect width="800" height="500" fill="url(#centerGlow)"/>
  <g transform="translate(400 250)" fill="none" stroke="oklch(0.97 0.008 85)" stroke-opacity="0.55" stroke-linecap="round">
    <!-- Cardinal arms -->
    <line y1="-180" y2="180" stroke-width="1.2"/>
    <line x1="-180" x2="180" stroke-width="1.2"/>
    <!-- Diagonal arms -->
    <g stroke-opacity="0.3">
      <line transform="rotate(45)"  y1="-160" y2="160"/>
      <line transform="rotate(-45)" y1="-160" y2="160"/>
    </g>
    <!-- Compass diamond -->
    <polygon points="0,-110 22,0 0,110 -22,0" fill="oklch(0.62 0.16 22)" stroke="none" opacity="0.85"/>
    <polygon points="0,-110 22,0 0,110 -22,0" fill="none" stroke="oklch(0.78 0.13 195)" stroke-width="1.1"/>
    <!-- Center dot -->
    <circle r="5" fill="oklch(0.97 0.008 85)" stroke="none"/>
    <!-- N marker -->
    <text y="-200" font-family="'Inter','Inter Variable',sans-serif" font-size="10" letter-spacing="3" fill="oklch(0.78 0.13 195)" text-anchor="middle">N</text>
  </g>
</svg>
