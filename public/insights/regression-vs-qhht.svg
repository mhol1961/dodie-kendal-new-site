<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Two overlapping circles, the Venn of past-life regression and QHHT">
  <defs>
    <linearGradient id="bgB" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#101522"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <radialGradient id="tealBlobB" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="oklch(0.42 0.10 195)" stop-opacity="0.55"/>
      <stop offset="80%" stop-color="oklch(0.42 0.10 195)" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coralBlobB" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="oklch(0.62 0.16 22)" stop-opacity="0.55"/>
      <stop offset="80%" stop-color="oklch(0.62 0.16 22)" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bgB)"/>
  <!-- Past-life circle -->
  <g transform="translate(300 250)">
    <circle r="170" fill="url(#tealBlobB)"/>
    <circle r="170" fill="none" stroke="oklch(0.78 0.13 195)" stroke-width="1" opacity="0.6"/>
    <text y="-200" font-family="'Inter','Inter Variable',sans-serif" font-size="10" letter-spacing="3" fill="oklch(0.97 0.008 85)" text-anchor="middle" opacity="0.7">PAST-LIFE</text>
  </g>
  <!-- QHHT circle (overlap) -->
  <g transform="translate(500 250)">
    <circle r="200" fill="url(#coralBlobB)"/>
    <circle r="200" fill="none" stroke="oklch(0.62 0.16 22)" stroke-width="1" opacity="0.7"/>
    <text y="-230" font-family="'Inter','Inter Variable',sans-serif" font-size="10" letter-spacing="3" fill="oklch(0.97 0.008 85)" text-anchor="middle" opacity="0.85">QHHT</text>
  </g>
</svg>
