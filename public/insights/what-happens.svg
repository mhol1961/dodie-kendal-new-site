<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="A clock with concentric circles representing a 5-hour QHHT session">
  <defs>
    <linearGradient id="bgA" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#101522"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <radialGradient id="glowA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="oklch(0.78 0.13 195)" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#0a0e1a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coralBloom" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="oklch(0.62 0.16 22)" stop-opacity="0.25"/>
      <stop offset="70%" stop-color="#0a0e1a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bgA)"/>
  <rect width="800" height="500" fill="url(#glowA)"/>
  <rect width="800" height="500" fill="url(#coralBloom)"/>
  <!-- Concentric rings = the 5 hours unfolding -->
  <g transform="translate(400 250)" fill="none" stroke="oklch(0.97 0.008 85)" stroke-opacity="0.55">
    <circle r="200" stroke-width="0.6"/>
    <circle r="155" stroke-width="0.6"/>
    <circle r="110" stroke-width="0.6"/>
    <circle r="65"  stroke-width="0.6"/>
    <circle r="22"  fill="oklch(0.62 0.16 22)" stroke="none"/>
    <!-- Hour ticks -->
    <g stroke="oklch(0.78 0.13 195)" stroke-width="1.5" stroke-linecap="round">
      <line y1="-205" y2="-180"/>
      <line transform="rotate(72)"  y1="-205" y2="-180"/>
      <line transform="rotate(144)" y1="-205" y2="-180"/>
      <line transform="rotate(216)" y1="-205" y2="-180"/>
      <line transform="rotate(288)" y1="-205" y2="-180"/>
    </g>
  </g>
</svg>
