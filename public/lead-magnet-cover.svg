  </text>
  <line x1="56" y1="138" x2="180" y2="138" stroke="#d97056" stroke-width="1" opacity="0.7"/>

  <!-- Title -->
  <text x="56" y="220" font-family="'Fraunces','Cormorant Garamond',Georgia,serif" font-size="64" fill="#f7f3ec" font-weight="450">
    Before
  </text>
  <text x="56" y="290" font-family="'Fraunces','Cormorant Garamond',Georgia,serif" font-size="64" font-style="italic" fill="#a3d4d5" font-weight="450">
    your session.
  </text>

  <!-- Subhead -->
  <text x="56" y="340" font-family="'Inter','Inter Variable',sans-serif" font-size="16" fill="#f7f3ec" opacity="0.78">
    A short guide to preparing for your first
  </text>
  <text x="56" y="362" font-family="'Inter','Inter Variable',sans-serif" font-size="16" fill="#f7f3ec" opacity="0.78">
    Quantum Healing Hypnosis Technique session.
  </text>

  <!-- Bullet preview block -->
  <g transform="translate(56, 440)">
    <text x="0" y="0" font-family="'Cormorant Garamond',Georgia,serif" font-size="16" fill="#d97056" letter-spacing="3">
      INSIDE
    </text>
    <line x1="0" y1="12" x2="80" y2="12" stroke="#d97056" stroke-width="1" opacity="0.7"/>
    <g font-family="'Inter','Inter Variable',sans-serif" font-size="15" fill="#f7f3ec" opacity="0.88">
      <text x="0" y="42">— What the Theta state actually feels like</text>
      <text x="0" y="70">— How to shape your three guiding questions</text>
      <text x="0" y="98">— Day-of: what to eat, wear, bring</text>
      <text x="0" y="126">— What unfolds in the week after</text>
    </g>
  </g>

  <!-- Footer / sigil -->
  <g transform="translate(300, 660)">
    <circle cx="0" cy="0" r="32" fill="none" stroke="#d97056" stroke-width="1" opacity="0.75"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#a3d4d5" stroke-width="1" opacity="0.55"/>
    <circle cx="0" cy="0" r="6" fill="#d97056" opacity="0.9"/>
  </g>
  <text x="300" y="730" font-family="'Inter','Inter Variable',sans-serif" font-size="11" letter-spacing="3" fill="#f7f3ec" opacity="0.55" text-anchor="middle">
